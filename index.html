<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Price | jkpdevlabs</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 32px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #58a6ff;
            font-size: 24px;
            margin-bottom: 8px;
        }

        p {
            color: #8b949e;
            line-height: 1.5;
            font-size: 16px;
        }

        .status {
            color: #3fb950;
            font-weight: bold;
            margin-top: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #3fb950;
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>jkpdevlabs portfolio design card</h1>
        <p>Architectural Phase: Portfolio Website</p>
        <div class="status"><span class="dot"></span> System Online: Anastasia (NVMe Core)</div>
    </div>
</body>

</html>
